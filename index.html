<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 مفاجأة العجوز شيماء</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #ffe9f4 0%, #ffd9e8 100%);
            background-attachment: fixed;
            padding: 8px;
            background-image: 
                radial-gradient(circle at 10% 30%, rgba(255, 182, 193, 0.3) 0%, transparent 30%),
                radial-gradient(circle at 90% 70%, rgba(255, 105, 180, 0.2) 0%, transparent 40%);
        }

        /* ====== الحاوية الرئيسية ====== */
        .container {
            background: rgba(255, 245, 248, 0.92);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 70px 70px 50px 50px;
            padding: 20px 15px 25px;
            max-width: 1100px;
            width: 100%;
            box-shadow: 0 30px 60px -10px rgba(199, 21, 133, 0.35),
                        0 0 0 3px #ffe2ed inset,
                        0 0 0 6px #fff5f9 inset;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* زخرفة علوية */
        .top-deco {
            font-size: 22px;
            letter-spacing: 10px;
            color: #f8a4b8;
            margin-bottom: 5px;
            opacity: 0.6;
            width: 100%;
        }

        /* ====== زر المفاجأة ====== */
        .btn-surprise {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff8fab, #e8436e);
            border: 8px solid #fff;
            box-shadow: 0 15px 40px rgba(232, 67, 110, 0.7), 0 0 0 15px rgba(255, 255, 255, 0.25);
            color: #fff;
            font-size: 38px;
            font-weight: 900;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin: 5px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
            letter-spacing: 3px;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
        }

        .btn-surprise:hover {
            transform: scale(1.08);
            box-shadow: 0 20px 50px rgba(232, 67, 110, 0.9), 0 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .btn-surprise:active {
            transform: scale(0.92);
        }

        .btn-surprise.hidden {
            display: none;
        }

        /* ====== النص البديل (إصلاح مشكلة القص) ====== */
        .text-placeholder {
            display: none;
            font-family: 'Tajawal', sans-serif;
            font-weight: 900;
            font-size: clamp(3rem, 15vw, 6rem);
            letter-spacing: 3px;
            line-height: 1.4;
            padding: 20px 25px;
            animation: textPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            flex-shrink: 0;
            /* إضافة مسافات داخلية إضافية لمنع القص */
            overflow: visible;
        }

        /* النص فقط باللون الوردي/الأحمر - مع إصلاح القص */
        .text-placeholder .text-only {
            background: linear-gradient(135deg, #e8436e, #ff6b8a, #e8436e);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 30px rgba(232, 67, 110, 0.3);
            /* إضافة مسافات لمنع القص */
            display: inline-block;
            padding: 5px 0;
            line-height: 1.4;
        }

        /* الإيموجي يبقى طبيعي */
        .text-placeholder .emoji {
            color: initial;
            -webkit-text-fill-color: initial;
            background: none;
            text-shadow: none;
            display: inline-block;
            padding: 5px 0;
        }

        /* السطر الجديد */
        .text-placeholder br {
            display: block;
            content: "";
            margin: 5px 0;
        }

        .text-placeholder.show {
            display: block;
        }

        @keyframes textPop {
            0% {
                opacity: 0;
                transform: scale(0.3) rotate(-10deg);
            }
            60% {
                transform: scale(1.1) rotate(2deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }

        /* ====== منطقة الفيديو ====== */
        .gift-area {
            margin-top: 8px;
            display: none;
            animation: fadePop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: rgba(255, 240, 245, 0.2);
            border-radius: 35px;
            padding: 8px 6px 10px;
            border: 3px dashed #f8a4b8;
            width: 100%;
            max-width: 100%;
        }

        .gift-area.show {
            display: block;
        }

        @keyframes fadePop {
            0% {
                opacity: 0;
                transform: scale(0.5) rotate(-8deg);
            }
            60% {
                transform: scale(1.03) rotate(1deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }

        /* ====== فيديو أكبر ====== */
        .video-wrapper {
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(199, 21, 133, 0.35),
                        0 0 0 6px #fff,
                        0 0 0 10px rgba(255, 182, 193, 0.2);
            background: #0a0a0a;
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            position: relative;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            background: #111;
            aspect-ratio: 16 / 9;
            object-fit: contain;
            border: none;
            min-height: 350px;
            max-height: 80vh;
        }

        /* ====== زينة ====== */
        .deco-flowers {
            font-size: 24px;
            letter-spacing: 12px;
            color: #f8a4b8;
            opacity: 0.4;
            margin-top: 6px;
            width: 100%;
        }

        .bottom-deco {
            margin-top: 10px;
            font-size: 18px;
            color: #d97a9b;
            opacity: 0.4;
            letter-spacing: 6px;
            width: 100%;
        }

        /* ====== تأثير أيقونات الضحك ====== */
        .laugh-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .laugh-icon {
            position: absolute;
            font-size: 50px;
            animation: laughFloat 3s ease-out forwards;
            opacity: 0;
        }

        @keyframes laughFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.3) rotate(0deg);
            }
            40% {
                opacity: 1;
                transform: translateY(-250px) scale(1.8) rotate(25deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-550px) scale(0.6) rotate(-15deg);
            }
        }

        /* ====== تنسيق الجوال ====== */
        @media (max-width: 600px) {
            .container { padding: 15px 10px 18px; border-radius: 40px; min-height: 250px; }
            .btn-surprise { width: 150px; height: 150px; font-size: 28px; border-width: 5px; }
            .text-placeholder { 
                font-size: clamp(2.2rem, 12vw, 4rem);
                padding: 15px 15px;
            }
            .text-placeholder .text-only {
                padding: 3px 0;
            }
            .video-wrapper { border-radius: 18px; }
            .laugh-icon { font-size: 35px; }
            .top-deco { font-size: 18px; letter-spacing: 6px; }
            video { min-height: 200px; max-height: 60vh; }
        }

        @media (max-width: 400px) {
            .container { padding: 10px 6px 14px; }
            .btn-surprise { width: 120px; height: 120px; font-size: 22px; }
            .text-placeholder { 
                font-size: clamp(1.8rem, 10vw, 3rem);
                padding: 10px 10px;
            }
            .text-placeholder .text-only {
                padding: 2px 0;
            }
            .laugh-icon { font-size: 28px; }
            video { min-height: 150px; max-height: 50vh; }
        }
    </style>
</head>
<body>

    <!-- تأثير أيقونات الضحك -->
    <div class="laugh-effect" id="laughEffect"></div>

    <!-- عنصر الصوت المخفي (يتم تحميله عند دخول الصفحة) -->
    <audio id="laughAudio" preload="auto">
        <!-- ⬇️ استبدل الرابط بصوت ضحك ⬇️ -->
        <source src="https://www.myinstants.com/media/sounds/laugh-track.mp3" type="audio/mpeg">
        متصفحك لا يدعم الصوت.
    </audio>

    <div class="container">

        <!-- زخرفة علوية -->
        <div class="top-deco">🌸 ✿ 🌷 ✿ 🌸</div>

        <!-- زر المفاجأة -->
        <button class="btn-surprise" id="surpriseBtn">🎁 مفاجأة</button>

        <!-- النص البديل (الإيموجي طبيعي، النص وردي/أحمر) -->
        <div class="text-placeholder" id="textPlaceholder">
            <span class="emoji">🧓</span> <span class="text-only">العجوز شيماء</span><br>
            <span class="text-only">سيدة المخرفين</span> <span class="emoji">👑</span>
        </div>

        <!-- منطقة الفيديو -->
        <div class="gift-area" id="giftArea">
            <div class="video-wrapper">
                <video id="surpriseVideo" preload="auto" playsinline loop>
                    <source src="a.mp4" type="video/mp4">
                    متصفحك لا يدعم تشغيل الفيديو.
                </video>
            </div>
            <div class="deco-flowers">✿ ❀ ✿ ❀ ✿</div>
        </div>

        <!-- زخرفة سفلية -->
        <div class="bottom-deco">✧ ✦ ✧ ✦ ✧</div>
    </div>

    <script>
        (function() {
            'use strict';

            const surpriseBtn = document.getElementById('surpriseBtn');
            const giftArea = document.getElementById('giftArea');
            const video = document.getElementById('surpriseVideo');
            const laughEffect = document.getElementById('laughEffect');
            const textPlaceholder = document.getElementById('textPlaceholder');
            const laughAudio = document.getElementById('laughAudio');

            // ===== تحميل الفيديو مسبقاً =====
            if (video) {
                video.preload = 'auto';
                video.loop = true;
                video.load();
                video.play().catch(() => {});
            }

            // ===== تحميل صوت الضحك مسبقاً =====
            if (laughAudio) {
                laughAudio.preload = 'auto';
                laughAudio.load();
                laughAudio.volume = 1.0;
                
                const preloadPlay = laughAudio.play();
                if (preloadPlay !== undefined) {
                    preloadPlay.then(() => {
                        laughAudio.pause();
                        laughAudio.currentTime = 0;
                    }).catch(() => {});
                }
            }

            // دالة لإظهار أيقونات الضحك
            function showLaughIcons() {
                const laughEmojis = ['😂', '🤣', '😆', '😹', '🤭', '😄', '😁', '🤣', '😂', '😆', '😅', '🤣'];

                laughEffect.innerHTML = '';

                for (let i = 0; i < 35; i++) {
                    const icon = document.createElement('div');
                    icon.className = 'laugh-icon';
                    icon.textContent = laughEmojis[Math.floor(Math.random() * laughEmojis.length)];

                    icon.style.left = (Math.random() * 90 + 5) + '%';
                    icon.style.top = (Math.random() * 80 + 10) + '%';

                    const size = Math.random() * 55 + 30;
                    icon.style.fontSize = size + 'px';

                    icon.style.animationDelay = (Math.random() * 1.5) + 's';
                    const duration = Math.random() * 2.5 + 2;
                    icon.style.animationDuration = duration + 's';

                    laughEffect.appendChild(icon);
                }

                setTimeout(() => {
                    laughEffect.innerHTML = '';
                }, 4500);
            }

            // دالة لتشغيل صوت الضحك لمدة 2 ثانية
            function playLaughSound() {
                if (laughAudio) {
                    laughAudio.currentTime = 0;
                    laughAudio.volume = 1.0;
                    
                    const playPromise = laughAudio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => {
                            setTimeout(() => {
                                laughAudio.play().catch(() => {});
                            }, 100);
                        });
                    }

                    setTimeout(() => {
                        laughAudio.pause();
                        laughAudio.currentTime = 0;
                    }, 2000);
                }
            }

            // عند الضغط على زر المفاجأة
            surpriseBtn.addEventListener('click', function() {
                surpriseBtn.classList.add('hidden');
                textPlaceholder.classList.add('show');
                giftArea.classList.add('show');

                if (video) {
                    video.muted = false;
                    video.loop = true;
                    const playPromise = video.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => {
                            setTimeout(() => {
                                video.play().catch(() => {});
                            }, 100);
                        });
                    }
                }

                playLaughSound();
                showLaughIcons();

                setTimeout(() => {
                    textPlaceholder.style.transform = 'scale(1.1)';
                    textPlaceholder.style.transition = '0.3s';
                    setTimeout(() => {
                        textPlaceholder.style.transform = 'scale(1)';
                    }, 300);
                }, 200);
            });

            document.addEventListener('click', function() {
                if (giftArea.classList.contains('show')) {
                    if (video) {
                        video.muted = false;
                        video.play().catch(() => {});
                    }
                }
            });

        })();
    </script>

</body>
  </html>
